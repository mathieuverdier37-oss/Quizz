// ─── HELPERS ────────────────────────────────────────────────────────────────
const normalize = (s) =>
  s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9 ]/g, "").trim();

const checkAnswer = (input, correct) => {
  const ni = normalize(input);
  const nc = normalize(correct);
  if (ni === nc) return "exact";
  // Accept partial for long answers (e.g. "Pierre et Marie Curie, Henri Becquerel")
  const parts = nc.split(/[,&]/).map(p => normalize(p.trim()));
  if (parts.length > 1 && parts.every(p => ni.includes(p))) return "exact";
  // Accept if main part matches
  const mainPart = normalize(correct.split("(")[0].split("—")[0].trim());
  if (ni === mainPart) return "exact";
  // Levenshtein for typos
  if (nc.length > 3) {
    const dist = levenshtein(ni, nc);
    if (dist <= Math.max(1, Math.floor(nc.length * 0.2))) return "close";
  }
  return "wrong";
};

const levenshtein = (a, b) => {
  const m = a.length, n = b.length;
  const d = Array.from({length: m+1}, (_, i) => {
    const row = new Array(n+1);
    row[0] = i;
    return row;
  });
  for (let j = 1; j <= n; j++) d[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]!==b[j-1]?1:0));
  return d[m][n];
};

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

const loadProgress = async () => {

    const r = localStorage.getItem("memo-progress");
    return r ? JSON.parse(r) : {};
  } catch { return {}; }
};

const saveProgress = async (progress) => {
  try {
    localStorage.setItem("memo-progress", JSON.stringify(progress));
  } catch {}
};

function MemoApp() {
  const [view, setView] = useState("home"); // home | learn | test | results
  const [catKey, setCatKey] = useState(null);
  const [progress, setProgress] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const link = document.createElement("link");
    link.href = FONT_LINK;
    link.rel = "stylesheet";
    document.head.appendChild(link);
    loadProgress().then(p => { setProgress(p); setLoaded(true); });
  }, []);

  const updateProgress = useCallback(async (catKey, itemIndex, correct) => {
    setProgress(prev => {
      const next = { ...prev };
      if (!next[catKey]) next[catKey] = {};
      const cur = next[catKey][itemIndex] || { correct: 0, attempts: 0, streak: 0, lastSeen: 0 };
      next[catKey][itemIndex] = {
        correct: cur.correct + (correct ? 1 : 0),
        attempts: cur.attempts + 1,
        streak: correct ? cur.streak + 1 : 0,
        lastSeen: Date.now(),
      };
      saveProgress(next);
      return next;
    });
  }, []);

  const resetCategoryProgress = useCallback(async (key) => {
    setProgress(prev => {
      const next = { ...prev };
      delete next[key];
      saveProgress(next);
      return next;
    });
  }, []);

  if (!loaded) return (
    <div style={{ background: COLORS.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <p style={{ color: COLORS.textDim, fontFamily: "DM Sans, sans-serif", fontSize: 18 }}>Chargement…</p>
    </div>
  );

  return (
    <div style={{
      background: COLORS.bg,
      minHeight: "100vh",
      fontFamily: "'DM Sans', sans-serif",
      color: COLORS.text,
      paddingBottom: 40,
    }}>
      {view === "home" && (
        <HomeView
          progress={progress}
          onSelect={(key, mode) => { setCatKey(key); setView(mode); }}
          onReset={resetCategoryProgress}
        />
      )}
      {view === "learn" && catKey && (
        <LearnView
          catKey={catKey}
          category={CATEGORIES[catKey]}
          progress={progress[catKey] || {}}
          onUpdate={(idx, ok) => updateProgress(catKey, idx, ok)}
          onBack={() => setView("home")}
        />
      )}
      {view === "test" && catKey && (
        <TestView
          catKey={catKey}
          category={CATEGORIES[catKey]}
          progress={progress[catKey] || {}}
          onUpdate={(idx, ok) => updateProgress(catKey, idx, ok)}
          onBack={() => setView("home")}
        />
      )}
    </div>
  );
}

      {/* Filter tabs */}
      <div style={{
        display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4,
        marginBottom: 16, scrollbarWidth: "none",
      }}>
        {CAT_GROUPS.map(g => (
          <button
            key={g.id}
            onClick={() => setFilter(g.id)}
            style={{
              padding: "7px 14px", borderRadius: 20, whiteSpace: "nowrap",
              background: filter === g.id ? COLORS.accent : COLORS.card,
              color: filter === g.id ? COLORS.bg : COLORS.textDim,
              border: filter === g.id ? "none" : `1px solid ${COLORS.border}`,
              fontWeight: 600, fontSize: 12, cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
              transition: "all 0.2s",
            }}
          >
            {g.label}
          </button>
        ))}
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {filteredKeys.map(key => {
          const cat = CATEGORIES[key];
          if (!cat) return null;
          const catProg = progress[key] || {};
          const total = cat.items.length;
          const mastered = Object.values(catProg).filter(p => p.streak >= 3).length;
          const attempted = Object.keys(catProg).length;
          const pct = total > 0 ? Math.round((mastered / total) * 100) : 0;

          return (
            <div key={key} style={{
              background: COLORS.card,
              borderRadius: 12,
              padding: 16,
              border: `1px solid ${COLORS.border}`,
              transition: "background 0.2s",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 22, marginBottom: 4 }}>{cat.icon}</div>
                  <h3 style={{ margin: "0 0 2px 0", fontSize: 16, fontWeight: 600 }}>{cat.title}</h3>
                  <p style={{ margin: 0, fontSize: 12, color: COLORS.textDim }}>{cat.description}</p>
                </div>
                <div style={{ textAlign: "right", minWidth: 70 }}>
                  <div style={{
                    fontSize: 24, fontWeight: 700,
                    color: pct === 100 ? COLORS.green : pct > 50 ? COLORS.orange : COLORS.textDim,
                    fontFamily: "'DM Serif Display', serif",
                  }}>
                    {pct}%
                  </div>
                  <div style={{ fontSize: 11, color: COLORS.textDim }}>
                    {mastered}/{total} acquis
                  </div>
                </div>
              </div>

              {/* Progress bar */}
              <div style={{
                height: 4, borderRadius: 2, background: COLORS.inputBg, marginTop: 12, overflow: "hidden"
              }}>
                <div style={{
                  height: "100%", borderRadius: 2,
                  width: `${pct}%`,
                  background: pct === 100 ? COLORS.green : `linear-gradient(90deg, ${COLORS.accent}, ${COLORS.orange})`,
                  transition: "width 0.5s ease",
                }} />
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button
                  onClick={() => onSelect(key, "learn")}
                  style={{
                    flex: 1, padding: "10px 0", borderRadius: 8,
                    background: COLORS.accent, color: COLORS.bg,
                    border: "none", fontWeight: 600, fontSize: 13,
                    cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                  }}
                >
                  Apprendre
                </button>
                <button
                  onClick={() => onSelect(key, "test")}
                  style={{
                    flex: 1, padding: "10px 0", borderRadius: 8,
                    background: "transparent", color: COLORS.accent,
                    border: `1.5px solid ${COLORS.accent}`,
                    fontWeight: 600, fontSize: 13,
                    cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                  }}
                >
                  Tester
                </button>
                {attempted > 0 && (
                  <button
                    onClick={() => { if (window.confirm(`Réinitialiser la progression de "${cat.title}" ?`)) onReset(key); }}
                    style={{
                      padding: "10px 12px", borderRadius: 8,
                      background: "transparent", color: COLORS.textDim,
                      border: `1px solid ${COLORS.border}`,
                      fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                    }}
                    title="Réinitialiser"
                  >
                    ↺
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── LEARN (Flashcards with active recall) ──────────────────────────────────
function LearnView({ catKey, category, progress, onUpdate, onBack }) {
  const [items] = useState(() => {
    // Prioritize items with low streak or never seen
    const scored = category.items.map((item, idx) => {
      const p = progress[idx];
      const score = p ? (p.streak >= 3 ? 100 : p.streak * 20 - (p.attempts - p.correct) * 10) : -1;
      return { item, idx, score };
    });
    scored.sort((a, b) => a.score - b.score);
    return scored.map(s => ({ ...s }));
  });

  const [current, setCurrent] = useState(0);
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null); // null | "exact" | "close" | "wrong"
  const [showAnswer, setShowAnswer] = useState(false);
  const [stats, setStats] = useState({ correct: 0, wrong: 0 });
  const inputRef = useRef(null);

  useEffect(() => {
    if (inputRef.current && !result) inputRef.current.focus();
  }, [current, result]);

  const currentItem = items[current];
  if (!currentItem) return null;

  const [question, answer] = currentItem.item;

  const handleSubmit = () => {
    if (!input.trim()) return;
    const r = checkAnswer(input, answer);
    setResult(r);
    const isCorrect = r === "exact" || r === "close";
    onUpdate(currentItem.idx, isCorrect);
    setStats(s => ({
      correct: s.correct + (isCorrect ? 1 : 0),
      wrong: s.wrong + (isCorrect ? 0 : 1),
    }));
    if (!isCorrect) setShowAnswer(true);
  };

  const handleNext = () => {
    setInput("");
    setResult(null);
    setShowAnswer(false);
    setCurrent(c => c + 1);
  };

  const handleReveal = () => {
    setResult("wrong");
    setShowAnswer(true);
    onUpdate(currentItem.idx, false);
    setStats(s => ({ ...s, wrong: s.wrong + 1 }));
  };

  const finished = current >= items.length;

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "24px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <button onClick={onBack} style={{
          background: "none", border: "none", color: COLORS.textDim, fontSize: 14,
          cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
        }}>← Retour</button>
        <span style={{ fontSize: 13, color: COLORS.textDim }}>
          {current + (finished ? 0 : 1)} / {items.length}
        </span>
        <div style={{ fontSize: 13 }}>
          <span style={{ color: COLORS.green }}>✓ {stats.correct}</span>
          {" "}
          <span style={{ color: COLORS.red }}>✗ {stats.wrong}</span>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ height: 3, borderRadius: 2, background: COLORS.inputBg, marginBottom: 24 }}>
        <div style={{
          height: "100%", borderRadius: 2,
          width: `${((current + (finished ? 0 : 0)) / items.length) * 100}%`,
          background: COLORS.accent,
          transition: "width 0.3s ease",
        }} />
      </div>

      {finished ? (
        <div style={{ textAlign: "center", paddingTop: 60 }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>
            {stats.correct > stats.wrong ? "🏆" : "📖"}
          </div>
          <h2 style={{ fontFamily: "'DM Serif Display', serif", color: COLORS.accent, marginBottom: 8 }}>
            Session terminée
          </h2>
          <p style={{ color: COLORS.textDim, fontSize: 15 }}>
            {stats.correct} bonnes réponses sur {stats.correct + stats.wrong}
          </p>
          <p style={{
            fontSize: 36, fontWeight: 700,
            color: stats.correct / (stats.correct + stats.wrong) > 0.7 ? COLORS.green : COLORS.orange,
            margin: "16px 0",
          }}>
            {Math.round((stats.correct / Math.max(1, stats.correct + stats.wrong)) * 100)}%
          </p>
          <button onClick={onBack} style={{
            marginTop: 20, padding: "12px 32px", borderRadius: 10,
            background: COLORS.accent, color: COLORS.bg, border: "none",
            fontWeight: 600, fontSize: 15, cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif",
          }}>
            Retour au menu
          </button>
        </div>
      ) : (
        <div style={{
          background: COLORS.card, borderRadius: 16, padding: 28,
          border: `1px solid ${COLORS.border}`,
        }}>
          <p style={{ fontSize: 11, color: COLORS.textDim, margin: "0 0 6px 0", textTransform: "uppercase", letterSpacing: 1.5 }}>
            {category.title}
          </p>
          <div style={{
            fontSize: 28, fontFamily: "'DM Serif Display', serif",
            color: COLORS.accent, marginBottom: 24, lineHeight: 1.3,
          }}>
            {question}
          </div>

          {!result ? (
            <div>
              <input
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") handleSubmit(); }}
                placeholder="Ta réponse…"
                autoComplete="off"
                autoCorrect="off"
                autoCapitalize="off"
                spellCheck="false"
                style={{
                  width: "100%", boxSizing: "border-box",
                  padding: "14px 16px", borderRadius: 10,
                  background: COLORS.inputBg, border: `1.5px solid ${COLORS.border}`,
                  color: COLORS.text, fontSize: 16, fontFamily: "'DM Sans', sans-serif",
                  outline: "none",
                }}
              />
              <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
                <button onClick={handleSubmit} style={{
                  flex: 1, padding: "12px 0", borderRadius: 10,
                  background: COLORS.accent, color: COLORS.bg, border: "none",
                  fontWeight: 600, fontSize: 15, cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif",
                }}>
                  Valider
                </button>
                <button onClick={handleReveal} style={{
                  padding: "12px 20px", borderRadius: 10,
                  background: "transparent", color: COLORS.textDim,
                  border: `1px solid ${COLORS.border}`,
                  fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                }}>
                  Voir la réponse
                </button>
              </div>
            </div>
          ) : (
            <div>
              <div style={{
                padding: "14px 18px", borderRadius: 10, marginBottom: 14,
                background: result === "exact" ? COLORS.greenDim
                  : result === "close" ? "#3b2f00"
                  : COLORS.redDim,
                border: `1.5px solid ${result === "exact" ? COLORS.green
                  : result === "close" ? COLORS.orange
                  : COLORS.red}`,
              }}>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4,
                  color: result === "exact" ? COLORS.green : result === "close" ? COLORS.orange : COLORS.red,
                }}>
                  {result === "exact" ? "✓ Correct !" : result === "close" ? "≈ Presque !" : "✗ Incorrect"}
                </div>
                {result !== "exact" && (
                  <div style={{ fontSize: 13, color: COLORS.textDim }}>
                    Ta réponse : <span style={{ color: COLORS.text }}>{input || "(vide)"}</span>
                  </div>
                )}
              </div>

              {showAnswer && (
                <div style={{
                  padding: "14px 18px", borderRadius: 10, marginBottom: 14,
                  background: COLORS.inputBg, border: `1px solid ${COLORS.border}`,
                }}>
                  <div style={{ fontSize: 11, color: COLORS.textDim, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1 }}>
                    Réponse correcte
                  </div>
                  <div style={{
                    fontSize: 18, fontWeight: 600, color: COLORS.accent,
                    fontFamily: "'DM Serif Display', serif",
                  }}>
                    {answer}
                  </div>
                </div>
              )}

              <button onClick={handleNext} style={{
                width: "100%", padding: "12px 0", borderRadius: 10,
                background: COLORS.accent, color: COLORS.bg, border: "none",
                fontWeight: 600, fontSize: 15, cursor: "pointer",
                fontFamily: "'DM Sans', sans-serif",
              }}>
                Suivant →
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── TEST (Timed quiz) ──────────────────────────────────────────────────────
function TestView({ catKey, category, progress, onUpdate, onBack }) {
  const [mode, setMode] = useState("setup"); // setup | running | done
  const [count, setCount] = useState(20);
  const [items, setItems] = useState([]);
  const [current, setCurrent] = useState(0);
  const [input, setInput] = useState("");
  const [results, setResults] = useState([]);
  const [timer, setTimer] = useState(0);
  const timerRef = useRef(null);
  const inputRef = useRef(null);

  const maxCount = category.items.length;

  const startTest = () => {
    const n = Math.min(count, maxCount);
    const shuffled = shuffle(category.items.map((item, idx) => ({ item, idx })));
    setItems(shuffled.slice(0, n));
    setResults([]);
    setCurrent(0);
    setInput("");
    setTimer(0);
    setMode("running");
    timerRef.current = setInterval(() => setTimer(t => t + 1), 1000);
  };

  useEffect(() => {
    if (mode === "running" && inputRef.current) inputRef.current.focus();
  }, [mode, current]);

  useEffect(() => {
    return () => { if (timerRef.current) clearInterval(timerRef.current); };
  }, []);

  const handleSubmit = () => {
    if (!input.trim()) return;
    const { item, idx } = items[current];
    const r = checkAnswer(input, item[1]);
    const isCorrect = r === "exact" || r === "close";
    onUpdate(idx, isCorrect);
    setResults(prev => [...prev, { question: item[0], answer: item[1], userAnswer: input, result: r }]);
    setInput("");

    if (current + 1 >= items.length) {
      clearInterval(timerRef.current);
      setMode("done");
    } else {
      setCurrent(c => c + 1);
    }
  };

  const handleSkip = () => {
    const { item, idx } = items[current];
    onUpdate(idx, false);
    setResults(prev => [...prev, { question: item[0], answer: item[1], userAnswer: "", result: "skipped" }]);
    setInput("");
    if (current + 1 >= items.length) {
      clearInterval(timerRef.current);
      setMode("done");
    } else {
      setCurrent(c => c + 1);
    }
  };

  const formatTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  if (mode === "setup") {
    return (
      <div style={{ maxWidth: 420, margin: "0 auto", padding: "24px 16px" }}>
        <button onClick={onBack} style={{
          background: "none", border: "none", color: COLORS.textDim, fontSize: 14,
          cursor: "pointer", fontFamily: "'DM Sans', sans-serif", marginBottom: 24,
        }}>← Retour</button>

        <div style={{
          background: COLORS.card, borderRadius: 16, padding: 28,
          border: `1px solid ${COLORS.border}`, textAlign: "center",
        }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>{category.icon}</div>
          <h2 style={{ fontFamily: "'DM Serif Display', serif", color: COLORS.accent, margin: "0 0 8px 0" }}>
            Test : {category.title}
          </h2>
          <p style={{ color: COLORS.textDim, fontSize: 13, margin: "0 0 24px 0" }}>
            {category.description}
          </p>

          <div style={{ marginBottom: 24 }}>
            <label style={{ fontSize: 13, color: COLORS.textDim, display: "block", marginBottom: 8 }}>
              Nombre de questions
            </label>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16 }}>
              <button onClick={() => setCount(c => Math.max(5, c - 5))} style={{
                width: 36, height: 36, borderRadius: 8, border: `1px solid ${COLORS.border}`,
                background: COLORS.inputBg, color: COLORS.text, fontSize: 18, cursor: "pointer",
              }}>−</button>
              <span style={{ fontSize: 28, fontWeight: 700, color: COLORS.accent, minWidth: 50 }}>
                {Math.min(count, maxCount)}
              </span>
              <button onClick={() => setCount(c => Math.min(maxCount, c + 5))} style={{
                width: 36, height: 36, borderRadius: 8, border: `1px solid ${COLORS.border}`,
                background: COLORS.inputBg, color: COLORS.text, fontSize: 18, cursor: "pointer",
              }}>+</button>
            </div>
            <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 6 }}>
              sur {maxCount} disponibles
            </div>
          </div>

          <button onClick={startTest} style={{
            padding: "14px 40px", borderRadius: 10,
            background: COLORS.accent, color: COLORS.bg, border: "none",
            fontWeight: 700, fontSize: 16, cursor: "pointer",
            fontFamily: "'DM Sans', sans-serif",
          }}>
            Lancer le test
          </button>
        </div>
      </div>
    );
  }

  if (mode === "running") {
    const { item } = items[current];
    return (
      <div style={{ maxWidth: 520, margin: "0 auto", padding: "24px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <span style={{ fontSize: 13, color: COLORS.textDim }}>
            {current + 1} / {items.length}
          </span>
          <span style={{ fontSize: 15, fontWeight: 600, color: COLORS.accent, fontFamily: "'DM Serif Display', serif" }}>
            {formatTime(timer)}
          </span>
        </div>

        <div style={{ height: 3, borderRadius: 2, background: COLORS.inputBg, marginBottom: 28 }}>
          <div style={{
            height: "100%", borderRadius: 2, width: `${(current / items.length) * 100}%`,
            background: COLORS.accent, transition: "width 0.3s ease",
          }} />
        </div>

        <div style={{
          background: COLORS.card, borderRadius: 16, padding: 28,
          border: `1px solid ${COLORS.border}`,
        }}>
          <p style={{ fontSize: 11, color: COLORS.textDim, margin: "0 0 6px 0", textTransform: "uppercase", letterSpacing: 1.5 }}>
            {category.title}
          </p>
          <div style={{
            fontSize: 28, fontFamily: "'DM Serif Display', serif",
            color: COLORS.accent, marginBottom: 24, lineHeight: 1.3,
          }}>
            {item[0]}
          </div>

          <input
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") handleSubmit(); }}
            placeholder="Ta réponse…"
            autoComplete="off"
            autoCorrect="off"
            autoCapitalize="off"
            spellCheck="false"
            style={{
              width: "100%", boxSizing: "border-box",
              padding: "14px 16px", borderRadius: 10,
              background: COLORS.inputBg, border: `1.5px solid ${COLORS.border}`,
              color: COLORS.text, fontSize: 16, fontFamily: "'DM Sans', sans-serif",
              outline: "none",
            }}
          />

          <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
            <button onClick={handleSubmit} style={{
              flex: 1, padding: "12px 0", borderRadius: 10,
              background: COLORS.accent, color: COLORS.bg, border: "none",
              fontWeight: 600, fontSize: 15, cursor: "pointer",
              fontFamily: "'DM Sans', sans-serif",
            }}>
              Valider
            </button>
            <button onClick={handleSkip} style={{
              padding: "12px 20px", borderRadius: 10,
              background: "transparent", color: COLORS.textDim,
              border: `1px solid ${COLORS.border}`,
              fontSize: 13, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
            }}>
              Passer
            </button>
          </div>
        </div>
      </div>
    );
  }

  // mode === "done"
  const correct = results.filter(r => r.result === "exact" || r.result === "close").length;
  const pct = Math.round((correct / results.length) * 100);

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", padding: "24px 16px" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 48, marginBottom: 8 }}>
          {pct >= 90 ? "🏆" : pct >= 70 ? "💪" : pct >= 50 ? "📖" : "🔄"}
        </div>
        <h2 style={{ fontFamily: "'DM Serif Display', serif", color: COLORS.accent, margin: "0 0 4px 0" }}>
          Résultat : {pct}%
        </h2>
        <p style={{ color: COLORS.textDim, fontSize: 14, margin: 0 }}>
          {correct}/{results.length} en {formatTime(timer)}
        </p>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 24 }}>
        {results.map((r, i) => (
          <div key={i} style={{
            display: "flex", alignItems: "center", gap: 10,
            padding: "10px 14px", borderRadius: 8,
            background: r.result === "exact" || r.result === "close" ? COLORS.greenDim : COLORS.redDim,
            border: `1px solid ${r.result === "exact" || r.result === "close" ? COLORS.green + "40" : COLORS.red + "40"}`,
          }}>
            <span style={{
              fontSize: 14,
              color: r.result === "exact" || r.result === "close" ? COLORS.green : COLORS.red,
              flexShrink: 0,
            }}>
              {r.result === "exact" || r.result === "close" ? "✓" : "✗"}
            </span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>
                {r.question}
              </div>
              <div style={{ fontSize: 12, color: COLORS.textDim }}>
                {r.answer}
                {r.result !== "exact" && r.result !== "close" && r.userAnswer && (
                  <span style={{ color: COLORS.red, marginLeft: 8 }}>
                    (toi : {r.userAnswer})
                  </span>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={() => { setMode("setup"); setCount(Math.min(count, maxCount)); }} style={{
          flex: 1, padding: "12px 0", borderRadius: 10,
          background: COLORS.accent, color: COLORS.bg, border: "none",
          fontWeight: 600, fontSize: 15, cursor: "pointer",
          fontFamily: "'DM Sans', sans-serif",
        }}>
          Recommencer
        </button>
        <button onClick={onBack} style={{
          flex: 1, padding: "12px 0", borderRadius: 10,
          background: "transparent", color: COLORS.accent,
          border: `1.5px solid ${COLORS.accent}`,
          fontWeight: 600, fontSize: 15, cursor: "pointer",
          fontFamily: "'DM Sans', sans-serif",
        }}>
          Menu
        </button>
      </div>
    </div>
  );
}
